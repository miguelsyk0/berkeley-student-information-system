# ============================================================
# Berkeley School System — Queries & Mutations
# Firebase Data Connect operations file (berkeley_operations.gql)
# ============================================================

# -------------------
# Queries
# -------------------

query GetUser($id: UUID!) @auth(level: USER) {
  user(id: $id) {
    id
    username
    email
    role
    isActive
    createdAt
  }
}

query ListUsers @auth(level: USER) {
  users {
    id
    username
    email
    role
    isActive
  }
}

query GetSchool @auth(level: USER) {
  schools {
    id
    name
    depedId
    district
    division
    region
    address
    contactNumber
    email
    principalName
  }
}

query GetSchoolYear($id: UUID!) @auth(level: USER) {
  schoolYear(id: $id) {
    id
    label
    startDate
    endDate
    isActive
    quarters_on_schoolYear {
      id
      quarterNumber
      startDate
      endDate
      isActive
    }
  }
}

query ListSchoolYears @auth(level: USER) {
  schoolYears {
    id
    label
    startDate
    endDate
    isActive
  }
}

query GetActiveSchoolYear @auth(level: USER) {
  schoolYears(where: { isActive: { eq: true } }) {
    id
    label
    startDate
    endDate
    isActive
  }
}

query GetTeacher($id: UUID!) @auth(level: USER) {
  teacher(id: $id) {
    id
    employeeId
    firstName
    middleName
    lastName
    suffix
    gender
    birthdate
    contactNumber
    email
    specialization
    isActive
  }
}

query ListTeachers @auth(level: USER) {
  teachers {
    id
    employeeId
    firstName
    middleName
    lastName
    gender
    specialization
    isActive
  }
}

query GetSection($id: UUID!) @auth(level: USER) {
  section(id: $id) {
    id
    gradeLevel
    name
    roomNumber
    schoolYear {
      id
      label
    }
    adviser {
      id
      firstName
      lastName
    }
    sectionSubjects_on_section {
      id
      subject {
        id
        name
        code
      }
      teacher {
        id
        firstName
        lastName
      }
    }
  }
}

query ListSections($schoolYearId: UUID) @auth(level: USER) {
  sections(where: { schoolYear: { id: { eq: $schoolYearId } } }) {
    id
    gradeLevel
    name
    roomNumber
    adviser {
      id
      firstName
      lastName
    }
  }
}

query GetSubject($id: UUID!) @auth(level: USER) {
  subject(id: $id) {
    id
    code
    name
    gradeLevel
    isMapeh
    mapehComponent
    description
    displayName
    sortOrder
    isActive
  }
}

query ListSubjects @auth(level: USER) {
  subjects(orderBy: [{ sortOrder: ASC }, { name: ASC }]) {
    id
    code
    name
    gradeLevel
    isMapeh
    mapehComponent
    displayName
    sortOrder
    isActive
  }
}

query GetStudent($id: UUID!) @auth(level: USER) {
  student(id: $id) {
    id
    lrn
    firstName
    middleName
    lastName
    suffix
    nameExtension
    gender
    birthdate
    birthPlace
    nationality
    religion
    motherTongue
    address
    barangay
    municipality
    province
    fatherName
    motherName
    guardianName
    guardianRelationship
    contactNumber
    elemSchoolName
    elemSchoolId
    elemGenAverage
    elemCitation
    isActive
    createdAt
  }
}

query GetStudentByLrn($lrn: String!) @auth(level: USER) {
  students(where: { lrn: { eq: $lrn } }) {
    id
    lrn
    firstName
    middleName
    lastName
    suffix
    gender
    birthdate
    isActive
  }
}

query ListStudents @auth(level: USER) {
  students(orderBy: [{ lastName: ASC }, { firstName: ASC }]) {
    id
    lrn
    firstName
    middleName
    lastName
    suffix
    gender
    birthdate
    isActive
  }
}

query GetEnrollment($id: UUID!) @auth(level: USER) {
  enrollment(id: $id) {
    id
    gradeLevel
    status
    enrollmentDate
    remarks
    student {
      id
      lrn
      firstName
      middleName
      lastName
    }
    schoolYear {
      id
      label
    }
    section {
      id
      name
      gradeLevel
    }
    academicRecords_on_enrollment {
      id
      generalAverage
      remarks
    }
  }
}

query ListEnrollments($schoolYearId: UUID, $sectionId: UUID) @auth(level: USER) {
  enrollments(where: {
    schoolYear: { id: { eq: $schoolYearId } }
    section: { id: { eq: $sectionId } }
  }) {
    id
    gradeLevel
    status
    enrollmentDate
    student {
      id
      lrn
      firstName
      lastName
    }
    schoolYear {
      id
      label
    }
    section {
      id
      name
    }
  }
}

query GetAcademicRecord($id: UUID!) @auth(level: USER) {
  academicRecord(id: $id) {
    id
    generalAverage
    remarks
    enrollment {
      id
      gradeLevel
      status
      student {
        id
        lrn
        firstName
        lastName
      }
    }
    subjectGrades_on_academicRecord {
      id
      q1Grade
      q2Grade
      q3Grade
      q4Grade
      finalGrade
      remarks
      subject {
        id
        name
        code
        isMapeh
        mapehComponent
      }
    }
  }
}

query ListSubjectGrades($academicRecordId: UUID!) @auth(level: USER) {
  subjectGrades(where: { academicRecord: { id: { eq: $academicRecordId } } }) {
    id
    q1Grade
    q2Grade
    q3Grade
    q4Grade
    finalGrade
    remarks
    subject {
      id
      name
      code
    }
  }
}

query GetTranscriptHeader($id: UUID!) @auth(level: USER) {
  transcriptHeader(id: $id) {
    id
    source
    schoolName
    schoolId
    district
    division
    region
    schoolAddress
    gradeLevel
    sectionName
    schoolYear
    adviserName
    generalAverage
    finalRemarks
    remedialFrom
    remedialTo
    displayOrder
    transcriptSubjectRows_on_transcriptHeader {
      id
      subjectName
      isMapeh
      mapehComponent
      q1Grade
      q2Grade
      q3Grade
      q4Grade
      finalRating
      remarks
      rowOrder
    }
    transcriptRemedialRows_on_transcriptHeader {
      id
      subjectName
      finalRating
      remedialClassMark
      recomputedFinalGrade
      remarks
      rowOrder
    }
  }
}

query ListTranscriptHeaders($studentId: UUID!) @auth(level: USER) {
  transcriptHeaders(
    where: { student: { id: { eq: $studentId } } }
    orderBy: [{ displayOrder: ASC }, { gradeLevel: ASC }]
  ) {
    id
    source
    gradeLevel
    sectionName
    schoolYear
    schoolName
    generalAverage
    finalRemarks
    displayOrder
  }
}

query GetImportLog($id: UUID!) @auth(level: USER) {
  importLog(id: $id) {
    id
    quarterNumber
    sourceUrl
    sourceFilename
    status
    totalRows
    successRows
    failedRows
    errorSummary
    importedAt
    completedAt
    schoolYear {
      id
      label
    }
    section {
      id
      name
      gradeLevel
    }
    columnMappings_on_importLog {
      id
      sourceColumn
      targetField
    }
    importPreviewRows_on_importLog {
      id
      rowNumber
      rawData
      mappedData
      isValid
      validationNotes
    }
    validationErrors_on_importLog {
      id
      rowNumber
      fieldName
      rawValue
      errorMessage
    }
  }
}

query ListImportLogs @auth(level: USER) {
  importLogs(orderBy: [{ importedAt: DESC }]) {
    id
    quarterNumber
    sourceFilename
    status
    totalRows
    successRows
    failedRows
    importedAt
    completedAt
    section {
      id
      name
      gradeLevel
    }
  }
}

# -------------------
# Mutations
# -------------------

mutation CreateUser(
  $username: String!
  $email: String!
  $passwordHash: String!
  $role: UserRole!
) @auth(level: USER) {
  user_insert(data: {
    username: $username
    email: $email
    passwordHash: $passwordHash
    role: $role
    isActive: true
  })
}

mutation UpdateUser(
  $id: UUID!
  $username: String
  $email: String
  $role: UserRole
  $isActive: Boolean
) @auth(level: USER) {
  user_update(id: $id, data: {
    username: $username
    email: $email
    role: $role
    isActive: $isActive
  })
}

mutation UpsertSchool(
  $name: String!
  $depedId: String
  $district: String
  $division: String
  $region: String
  $address: String
  $contactNumber: String
  $email: String
  $principalName: String
) @auth(level: USER) {
  school_upsert(data: {
    name: $name
    depedId: $depedId
    district: $district
    division: $division
    region: $region
    address: $address
    contactNumber: $contactNumber
    email: $email
    principalName: $principalName
  })
}

mutation CreateSchoolYear(
  $label: String!
  $startDate: Date!
  $endDate: Date!
  $isActive: Boolean
) @auth(level: USER) {
  schoolYear_insert(data: {
    label: $label
    startDate: $startDate
    endDate: $endDate
    isActive: $isActive
  })
}

mutation UpsertQuarter(
  $schoolYearId: UUID!
  $quarterNumber: Int!
  $startDate: Date
  $endDate: Date
  $isActive: Boolean
) @auth(level: USER) {
  quarter_upsert(data: {
    schoolYearId: $schoolYearId
    quarterNumber: $quarterNumber
    startDate: $startDate
    endDate: $endDate
    isActive: $isActive
  })
}

mutation CreateTeacher(
  $userId: UUID
  $employeeId: String
  $firstName: String!
  $middleName: String
  $lastName: String!
  $suffix: String
  $gender: String
  $birthdate: Date
