mutation StartImport(
  $schoolYearId: UUID!
  $sectionId: UUID!
  $quarterNumber: Int!
  $sourceUrl: String
  $sourceFilename: String
  $importedBy: UUID
) @auth(level: USER) {
  importLog_insert(data: {
    schoolYearId: $schoolYearId
    sectionId: $sectionId
    quarterNumber: $quarterNumber
    sourceUrl: $sourceUrl
    sourceFilename: $sourceFilename
    importedById: $importedBy
    status: processing
    totalRows: 0
    successRows: 0
    failedRows: 0
  })
}

mutation UpdateImportStatus(
  $id: UUID!
  $status: ImportStatus!
  $totalRows: Int
  $successRows: Int
  $failedRows: Int
  $errorSummary: String
) @auth(level: USER) {
  importLog_update(id: $id, data: {
    status: $status
    totalRows: $totalRows
    successRows: $successRows
    failedRows: $failedRows
    errorSummary: $errorSummary
  })
}

mutation AddColumnMapping(
  $importLogId: UUID!
  $sourceColumn: String!
  $targetField: String!
) @auth(level: USER) {
  columnMapping_insert(data: {
    importLogId: $importLogId
    sourceColumn: $sourceColumn
    targetField: $targetField
  })
}

mutation AddImportPreviewRow(
  $importLogId: UUID!
  $rowNumber: Int!
  $rawData: String!
  $mappedData: String
  $isValid: Boolean!
  $validationNotes: String
) @auth(level: USER) {
  importPreviewRow_insert(data: {
    importLogId: $importLogId
    rowNumber: $rowNumber
    rawData: $rawData
    mappedData: $mappedData
    isValid: $isValid
    validationNotes: $validationNotes
  })
}

mutation AddValidationError(
  $importLogId: UUID!
  $rowNumber: Int
  $fieldName: String
  $rawValue: String
  $errorMessage: String!
) @auth(level: USER) {
  validationError_insert(data: {
    importLogId: $importLogId
    rowNumber: $rowNumber
    fieldName: $fieldName
    rawValue: $rawValue
    errorMessage: $errorMessage
  })
}
