mutation EnrollStudent(
  $studentId: UUID!
  $schoolYearId: UUID!
  $sectionId: UUID!
  $gradeLevel: Int!
  $enrollmentDate: Date!
) @auth(level: USER) {
  enrollment_insert(data: {
    studentId: $studentId
    schoolYearId: $schoolYearId
    sectionId: $sectionId
    gradeLevel: $gradeLevel
    enrollmentDate: $enrollmentDate
    status: Enrolled
  })
}

mutation UpdateEnrollmentStatus(
  $id: UUID!
  $status: StudentStatus!
  $remarks: String
) @auth(level: USER) {
  enrollment_update(id: $id, data: {
    status: $status
    remarks: $remarks
  })
}

mutation UpsertSubjectGrade(
  $academicRecordId: UUID!
  $subjectId: UUID!
  $q1Grade: Float
  $q2Grade: Float
  $q3Grade: Float
  $q4Grade: Float
) @auth(level: USER) {
  subjectGrade_upsert(data: {
    academicRecordId: $academicRecordId
    subjectId: $subjectId
    q1Grade: $q1Grade
    q2Grade: $q2Grade
    q3Grade: $q3Grade
    q4Grade: $q4Grade
  })
}

