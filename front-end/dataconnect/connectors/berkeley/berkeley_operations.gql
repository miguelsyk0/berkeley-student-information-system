    userId: $userId
    employeeId: $employeeId
    firstName: $firstName
    middleName: $middleName
    lastName: $lastName
    suffix: $suffix
    gender: $gender
    birthdate: $birthdate
    contactNumber: $contactNumber
    email: $email
    specialization: $specialization
    isActive: true
  })
}

mutation UpdateTeacher(
  $id: UUID!
  $employeeId: String
  $firstName: String
  $middleName: String
  $lastName: String
  $suffix: String
  $gender: String
  $birthdate: Date
  $contactNumber: String
  $email: String
  $specialization: String
  $isActive: Boolean
